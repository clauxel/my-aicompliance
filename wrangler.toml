name = "my-aicompliance"
main = "worker/index.js"
compatibility_date = "2026-05-11"
account_id = "615b05ce6668dd8e0e2431077fc29c82"
pages_build_output_dir = "./dist"
workers_dev = true
routes = [
  { pattern = "aicompliance.online/*", zone_name = "aicompliance.online" },
  { pattern = "www.aicompliance.online/*", zone_name = "aicompliance.online" }
]

[vars]
APP_ORIGIN = "https://aicompliance.online"
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = [
  "/api/*",
  "/sitemap.xml",
  "/robots.txt",
  "/BingSiteAuth.xml"
]

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "a02b1a4d7089476bab2c2bae1b2a39a4"
