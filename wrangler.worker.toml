name = "my-aicompliance"
main = "worker/index.js"
compatibility_date = "2026-05-11"
workers_dev = true
routes = [
  { pattern = "voiceaiagent.space/*", zone_name = "voiceaiagent.space" },
  { pattern = "www.voiceaiagent.space/*", zone_name = "voiceaiagent.space" }
]

[vars]
CREEM_API_BASE = "https://api.creem.io"
CREEM_ENV = "live"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "a02b1a4d7089476bab2c2bae1b2a39a4"

[assets]
directory = "./dist"
binding = "SITE_ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true
